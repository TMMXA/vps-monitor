<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VPS Daily Report Preview</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="report" aria-label="VPS daily report">
        <header class="report-header">
          <div>
            <p class="eyebrow">Akile Monitor</p>
            <h1>VPS Daily Report</h1>
          </div>
          <div class="timestamp">
            <span>11:34 HKT</span>
            <strong>2026-05-13</strong>
          </div>
        </header>

        <div id="servers" class="server-list"></div>

        <footer class="report-footer">
          <span>统计口径：netin / netout 按 bits/s 换算，每小时聚合为 GiB。</span>
          <span>Generated for Telegram preview</span>
        </footer>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
